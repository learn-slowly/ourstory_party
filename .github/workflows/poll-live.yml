name: poll-live

on:
  workflow_dispatch:
    inputs:
      election_ids:
        description: "콤마 구분 elections.id (기본은 poll-live.ts DEFAULT_IDS)"
        required: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: poll-live
        run: |
          # GitHub Actions 환경에선 .env.local 없이 env 직접 사용
          npx tsx scripts/ingest/poll-live.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LIVE_ELECTION_IDS: ${{ inputs.election_ids }}
